name: Minecraft Paper Server (16GB RAM)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write   # Required for committing & pushing files back

jobs:
  run-minecraft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (all files from root)
        uses: actions/checkout@v4

      - name: Setup Java 21 (required for Paper 1.20.6)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download server.jar if it doesn't exist
        run: |
          if [ ! -f server.jar ]; then
            echo "server.jar not found → downloading Paper 1.20.6 build..."
            curl -L -o server.jar \
              https://fill-data.papermc.io/v1/objects/4b011f5adb5f6c72007686a223174fce82f31aeb4b34faf4652abc840b47e640/paper-1.20.6-151.jar
            echo "Download complete!"
          else
            echo "server.jar already exists → using it."
          fi

      - name: Create eula.txt if it doesn't exist
        run: |
          if [ ! -f eula.txt ]; then
            echo "eula.txt not found → creating with eula=true"
            echo "eula=true" > eula.txt
          else
            echo "eula.txt already exists → keeping current settings."
          fi

      - name: Run Minecraft Paper Server (16 GB RAM)
        timeout-minutes: 350          # 5 hours (safe under GitHub's 6h limit)
        continue-on-error: true       # IMPORTANT: Allows upload + re-run even when step is killed
        run: |
          echo "Starting Paper server with 16 GB RAM allocation (will run up to 5 hours)..."
          java -Xmx16G -Xms16G \
               -XX:+UseG1GC \
               -XX:+ParallelRefProcEnabled \
               -XX:MaxGCPauseMillis=200 \
               -XX:+UnlockExperimentalVMOptions \
               -XX:+DisableExplicitGC \
               -XX:+AlwaysPreTouch \
               -XX:G1NewSizePercent=30 \
               -XX:G1MaxNewSizePercent=40 \
               -XX:G1HeapRegionSize=8M \
               -XX:G1ReservePercent=20 \
               -XX:G1HeapWastePercent=5 \
               -XX:G1MixedGCCountTarget=4 \
               -XX:InitiatingHeapOccupancyPercent=15 \
               -XX:G1MixedGCLiveThresholdPercent=90 \
               -XX:G1RSetUpdatingPauseTimePercent=5 \
               -XX:SurvivorRatio=32 \
               -XX:+PerfDisableSharedMem \
               -XX:MaxTenuringThreshold=1 \
               -jar server.jar nogui

      - name: Upload all changed files back to repository
        if: always()                  # Runs even if server step timed out
        run: |
          echo "Checking for changes made by the Minecraft server..."
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add all changes
          git add -A
          
          # Check if there are any changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            echo "Committing and pushing changes..."
            git commit -m "chore: Update Minecraft server files (world, plugins, logs, etc.) [skip ci]"
            git push
            echo "✅ Successfully pushed updated files to repository."
          fi

      # Last step: Re-run the workflow automatically
      - name: Re-run workflow
        if: always()                  # Runs even if server step timed out
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Server stopped (or timed out). Triggering new workflow run..."
          gh workflow run \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }} \
            "${{ github.workflow }}"
