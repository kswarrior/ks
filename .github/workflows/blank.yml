name: Minecraft Paper Server (16GB RAM)

on:
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  run-minecraft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                    # ← CRITICAL FIX
          token: ${{ secrets.GITHUB_TOKEN }} # Ensures push works

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download Paper server.jar (if missing)
        run: |
          if [ ! -f server.jar ]; then
            echo "server.jar not found → downloading Paper 1.20.6 build 151..."
            curl -L -o server.jar \
              https://api.papermc.io/v2/projects/paper/versions/1.20.6/builds/151/downloads/paper-1.20.6-151.jar
            echo "Download complete!"
          else
            echo "Using existing server.jar"
          fi

      - name: Create eula.txt if missing
        run: |
          if [ ! -f eula.txt ]; then
            echo "eula=true" > eula.txt
            echo "Created eula.txt"
          fi

      - name: Run Minecraft Paper Server (16 GB RAM - 5 hours)
        timeout-minutes: 350
        continue-on-error: true
        run: |
          echo "🚀 Starting Paper server with 16 GB RAM..."
          java -Xmx16G -Xms16G \
               -XX:+UseG1GC \
               -XX:+ParallelRefProcEnabled \
               -XX:MaxGCPauseMillis=200 \
               -XX:+UnlockExperimentalVMOptions \
               -XX:+DisableExplicitGC \
               -XX:+AlwaysPreTouch \
               -XX:G1NewSizePercent=30 \
               -XX:G1MaxNewSizePercent=40 \
               -XX:G1HeapRegionSize=8M \
               -XX:G1ReservePercent=20 \
               -XX:G1HeapWastePercent=5 \
               -XX:G1MixedGCCountTarget=4 \
               -XX:InitiatingHeapOccupancyPercent=15 \
               -XX:G1MixedGCLiveThresholdPercent=90 \
               -XX:G1RSetUpdatingPauseTimePercent=5 \
               -XX:SurvivorRatio=32 \
               -XX:+PerfDisableSharedMem \
               -XX:MaxTenuringThreshold=1 \
               -jar server.jar nogui

      - name: Commit & Push all server changes (world, plugins, logs, etc.)
        if: always()
        run: |
          echo "Checking for changes made by the Minecraft server..."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --staged --quiet; then
            echo "✅ No changes to commit."
          else
            echo "📝 Committing changes..."
            git commit -m "chore: Update Minecraft server files (world, plugins, logs, etc.) [skip ci]"

            echo "🔄 Pulling latest remote changes (rebase)..."
            git fetch origin
            git rebase origin/${{ github.ref_name }} || {
              echo "⚠️ Rebase failed (rare conflict). Using merge instead..."
              git merge origin/${{ github.ref_name }} --no-edit
            }

            echo "🚀 Pushing to GitHub..."
            git push
            echo "✅ Successfully pushed updated files!"
          fi

      - name: Re-run workflow automatically
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Server stopped/timed out → triggering next run..."
          gh workflow run "${{ github.workflow }}" \
            --repo ${{ github.repository }} \
            --ref ${{ github.ref_name }}
